baseurl: https://wesleyel.github.io/
title: Country Road
copyright: Wesley Yang
theme: minimal-lines

defaultContentLanguage: zh-cn
hasCJKLanguage: true

languages:
  zh-cn:
    label: 中文
    weight: 1

services:
  googleAnalytics:
    id: G-KKMPD9QE50

pagination:
  pagerSize: 5

permalinks:
  post: /p/:slug/
  comment: /c/:slug/
  page: /:slug/

menu:
  social:
    - name: GitHub
      url: https://github.com/wesleyel

params:
  mainSections:
    - post
  subtitle: 这世界很美好，值得我们为之奋斗
  math: true
  readingTime: true
  favicon: /favicon.ico

  footer:
    since: 2022

  dateFormat:
    published: Jan 02, 2006

  colorScheme:
    toggle: true
    default: auto

  post:
    comments: true
    toc: true

  comment:
    comments: true
    toc: true

  pageViews:
    enabled: true
    script: //busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js
    site: true   # 页脚：全站访问量 / 访客数
    page: true   # 文章页：本篇阅读数
    sections:
      - post
      - comment

  comments:
    enabled: true
    provider: giscus
    giscus:
      repo: wesleyel/wesleyel.github.io
      repoID: R_kgDOGXgP8g
      category: Announcements
      categoryID: DIC_kwDOGXgP8s4CiMOo
      mapping: title
      lightTheme: light
      darkTheme: dark
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: bottom
      lang: zh-CN

markup:
  goldmark:
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    lineNumbersInTable: false
    tabWidth: 4
