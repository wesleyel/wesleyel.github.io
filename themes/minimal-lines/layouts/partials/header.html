<header class="header">
  <div class="header-inner">
    <div class="site-brand">
      <a href="{{ "/" | relLangURL }}" class="site-title">{{ .Site.Title }}</a>
      {{- with .Site.Params.subtitle }}<p class="site-subtitle">{{ . }}</p>{{ end }}
    </div>
    <nav class="nav" aria-label="Main">
      <ul class="nav-list">
        {{- range .Site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{- end }}
        <li><a href="{{ "/categories/" | relLangURL }}"{{ if eq .Section "categories" }} class="active" aria-current="page"{{ end }}>分类</a></li>
      </ul>
    </nav>
    {{- if .Site.Params.colorScheme.toggle }}
    <button class="theme-toggle" type="button" aria-label="切换主题" title="切换主题">
      <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    {{- end }}
  </div>
</header>
