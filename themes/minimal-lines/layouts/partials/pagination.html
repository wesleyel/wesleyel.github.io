{{- if gt .Paginator.TotalPages 1 }}
<nav class="pagination" aria-label="Pagination">
  {{- if .Paginator.HasPrev }}
  <a class="pagination-prev" href="{{ .Paginator.Prev.URL }}">&larr; 较新</a>
  {{- else }}
  <span class="pagination-prev disabled">&larr; 较新</span>
  {{- end }}
  <span class="pagination-info">{{ .Paginator.PageNumber }} / {{ .Paginator.TotalPages }}</span>
  {{- if .Paginator.HasNext }}
  <a class="pagination-next" href="{{ .Paginator.Next.URL }}">较旧 &rarr;</a>
  {{- else }}
  <span class="pagination-next disabled">较旧 &rarr;</span>
  {{- end }}
</nav>
{{- end }}
